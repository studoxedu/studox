name: Build Desktop App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Vite + Electron (Windows)
        run: npm run electron:build:win -- --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: Studox-Windows-Installer
          path: release/*.exe
          retention-days: 30
